# ==============================================
# Infrastructure Portfolio — Mathéo
# ==============================================
# Usage : docker compose up -d
# Secrets : dans le fichier .env (JAMAIS commité)
# ==============================================

services:

  # ---- Base de données ----
  db:
    image: mariadb:${MARIADB_VERSION}
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend
    # PAS de "ports:" ici — la DB n'est JAMAIS exposée

  # ---- WordPress (PHP-FPM) ----
  wordpress:
    image: wordpress:${WORDPRESS_VERSION}
    container_name: portfolio-wp
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      PHP_INI_SCAN_DIR: ":/usr/local/etc/php/conf.d"
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./php-custom/security.ini:/usr/local/etc/php/conf.d/security.ini:ro
    networks:
      - frontend
      - backend

  # ---- Nginx (Reverse Proxy) ----
  webserver:
    image: nginx:${NGINX_VERSION}
    container_name: portfolio-nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html:ro
      - ./wp-content:/var/www/html/wp-content:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - frontend

  # ---- Certbot (SSL/TLS) ----
  certbot:
    image: certbot/certbot:v2.11.0
    container_name: portfolio-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - frontend

# ---- Réseaux isolés ----
networks:
  frontend:
    name: portfolio-frontend
  backend:
    name: portfolio-backend

# ---- Volumes persistants ----
volumes:
  db_data:
    name: portfolio-db-data
  wordpress_data:
    name: portfolio-wordpress-data
