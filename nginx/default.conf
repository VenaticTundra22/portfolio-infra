# ── Bloc 1 : Redirection HTTP → HTTPS ──
server {
    listen 80;
    server_name venatictundra22.com www.venatictundra22.com;
    server_tokens off;

    # Challenge ACME (renouvellement futur)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Bloc 2 : HTTPS (le vrai site) ──
server {
    listen 443 ssl;
    server_name venatictundra22.com www.venatictundra22.com;
    server_tokens off;

    # ── Certificats SSL ──
    ssl_certificate     /etc/letsencrypt/live/venatictundra22.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/venatictundra22.com/privkey.pem;

    # ── Sécurité SSL (bonnes pratiques) ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Headers de sécurité ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Bloquer les fichiers cachés ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── WordPress via PHP-FPM ──
    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
