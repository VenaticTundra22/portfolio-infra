server {
    server_tokens off;
    listen 80;
    server_name venatictundra22.com www.venatictundra22.com;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    root /var/www/html;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Taille max upload (pour les médias WordPress)
    client_max_body_size 64M;

    # Règle principale : essaye le fichier, sinon passe à WordPress
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

	# Bloque l'accès aux fichiers de configuration sensibles
	location ~* /(wp-config\.php|\.env|readme\.html|license\.txt) {
    	deny all;
    	access_log off;
    	log_not_found off;
    	return 404;
    }

    # Passe les fichiers PHP à WordPress (PHP-FPM)
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Bloque l'accès aux fichiers cachés (.env, .git, .htaccess)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
